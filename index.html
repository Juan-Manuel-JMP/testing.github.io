// DATATABLE
let tabla

$(document).ready(() => {

    // si ya existe, lo destruye (evita bugs)
    if ($.fn.DataTable.isDataTable("#tabla")) {
        $("#tabla").DataTable().destroy()
    }

    tabla = $("#tabla").DataTable({
        responsive: true,
        pageLength: 5,
        autoWidth: false,

        
        columnDefs: [
            {
                targets: "_all",
                defaultContent: ""
            }
        ]
    })

})


// LOG
function log(m){
let el=document.getElementById("log")
el.innerHTML+=`<div>[${new Date().toLocaleTimeString()}] ${m}</div>`
el.scrollTop=el.scrollHeight
}

function tipoCaja(caso){

    if(!caso) return "Caja Negra"

    const t = (caso.tipo || "").toLowerCase()
    const titulo = (caso.titulo || "").toLowerCase()
    const datos = (caso.datos || "").toLowerCase()

    if(
        t.includes("seguridad") ||
        titulo.includes("sql") ||
        titulo.includes("injection") ||
        datos.includes("<img") ||
        datos.includes("onerror") ||
        datos.includes("script")
    ){
        return "Caja Blanca"
    }

    if(
        t.includes("validación") ||
        titulo.includes("email") ||
        titulo.includes("unicode") ||
        titulo.includes("null") ||
        titulo.includes("espacios")
    ){
        return "Caja Gris"
    }

    return "Caja Negra"
}


// Ejecutar
async function ejecutarPruebas(){

tabla.clear().draw()

Swal.fire({title:"Ejecutando...",didOpen:()=>Swal.showLoading()})

for(let c of casos){

document.getElementById("user").value=c.user
document.getElementById("pass").value=c.pass

await new Promise(r=>setTimeout(r,500))

let res = simularLogin()
let estado = res === c.esperado ? "PASS" : "FAIL"

// CALCULAR CAJA
let caja = tipoCaja(c)

tabla.row.add([
c.id,
c.titulo,
c.modulo,
c.prioridad,
c.tipo,
c.pre,
c.datos,
c.pasos,
c.esperado,
res,
estado,
"evidencia.png",
estado==="FAIL"?"BUG-001":"-",
"Chrome",
"QA Tester",
new Date().toLocaleString(),
caja
])

tabla.draw(false)

log(`${c.id}: ${estado} | ${caja}`)

await new Promise(r=>setTimeout(r,400))
}

Swal.fire("Finalizado","QA completo","success")
}


function exportarPDF(){

    const { jsPDF } = window.jspdf
    const doc = new jsPDF("l","mm","a4")

    // ========================
    // HEADER (LOGO + TITULO)
    // ========================

    // Logo 
    doc.setFillColor(0, 212, 255)
    doc.circle(15, 15, 6, "F")

    doc.setFont("helvetica", "bold")
    doc.setFontSize(18)
    doc.text("Trabajo Práctico de la Materia Testing QA", 30, 15)

    // Subtítulo
    doc.setFontSize(11)
    doc.setFont("helvetica", "normal")
    doc.text("Reporte de casos de Prueba ejecutados en entorno Web", 30, 22)

    // Línea separadora
    doc.setDrawColor(0, 212, 255)
    doc.line(14, 28, 285, 28)

    // ========================
    // TABLA (DATOS COMPLETOS)
    // ========================

    let rows = []

    tabla.rows().every(function(){
    const d = this.data()

    rows.push([
        d[0], // ID
        d[1], // Título
        d[2], // Módulo
        d[3], // Prioridad
        d[4], // Tipo
        d[8], // Esperado
        d[9], // Actual
        d[10], // Estado
        d[16] // Caja
    ])
    })

    doc.autoTable({
        startY: 35,
        head: [[
        "ID",
        "Título",
        "Módulo",
        "Prioridad",
        "Tipo",
        "Esperado",
        "Resultado",
        "Estado",
        "Caja"
        ]],
        body: rows,
        theme: "grid",
        styles: {
            fontSize: 8,
            cellPadding: 2
        },
        headStyles: {
            fillColor: [0, 212, 255],
            textColor: 0,
            fontStyle: "bold"
        },
        alternateRowStyles: {
            fillColor: [245, 245, 245]
        }
    })

    // ========================
    // FOOTER
    // ========================

    const pageHeight = doc.internal.pageSize.height

    doc.setFontSize(10)
    doc.setTextColor(100)

    doc.text(
        "Sistema Casos de Pruebas",
        14,
        pageHeight - 20
    )

    doc.text(
        "Uso Exclusivo IFTS N°9",
        14,
        pageHeight - 14
    )

    doc.text(
        "© 2026 - Grupo N° 7 - Materia: Testing - Derechos Reservados",
        14,
        pageHeight - 8
    )

    // Descarga del PDF
    doc.save("QA_Testing_Report.pdf")
}
